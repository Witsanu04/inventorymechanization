<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบจัดการเครื่องมือ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&family=Fira+Code:wght@400&display=swap');
        
        :root {
            --neon-green: #00ff99;
            --bg-dark: #020617;
        }

        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Chakra Petch', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-green);
            filter: blur(150px);
            opacity: 0.05;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .login-card { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(0, 255, 153, 0.1); 
            backdrop-filter: blur(25px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-top: 4px solid var(--neon-green);
            position: relative;
        }

        select, input { 
            background: rgba(2, 6, 23, 0.8) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: white !important; 
            transition: all 0.3s ease;
        }

        select:focus, input:focus { 
            border-color: var(--neon-green) !important; 
            box-shadow: 0 0 20px rgba(0, 255, 153, 0.15); 
            outline: none;
            transform: translateY(-1px);
        }

        .btn-login {
            background: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-login:hover {
            box-shadow: 0 0 25px rgba(0, 255, 153, 0.5);
            transform: scale(1.02);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        option { background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div id="card" class="login-card w-full max-w-[420px] p-10 rounded-[2.5rem] text-center m-4">
        <div class="mb-8">
            <div class="w-24 h-24 bg-[#00ff99]/5 rounded-full flex items-center justify-center mx-auto mb-6 border border-[#00ff99]/20 relative">
                <i class="fa-solid fa-user-lock text-5xl text-[#00ff99] drop-shadow-[0_0_10px_#00ff99]"></i>
                <div class="absolute inset-0 rounded-full border border-[#00ff99]/20 animate-ping" style="animation-duration: 3s;"></div>
            </div>
            <h1 class="text-3xl font-black tracking-tight uppercase italic">ยืนยัน <span class="text-[#00ff99]">ตัวตน</span></h1>
            <p class="text-[10px] text-slate-400 tracking-[0.3em] font-bold uppercase mt-3">ระบบบันทึกการเบิก-คืนเครื่องมือ</p>
        </div>

        <div class="space-y-6">
            <div class="text-left">
                <label class="text-[11px] font-black text-slate-500 uppercase ml-4 mb-2 block tracking-widest">เลือกรายชื่อพนักงาน</label>
                <div class="relative">
                    <i class="fa-solid fa-address-card absolute left-5 top-1/2 -translate-y-1/2 text-[#00ff99]/50"></i>
                    <select id="staffSelect" class="w-full pl-12 pr-6 py-4 rounded-2xl font-bold appearance-none cursor-pointer text-sm">
                        <option value="" disabled selected>-- คลิกเพื่อเลือกชื่อของคุณ --</option>
                    </select>
                </div>
            </div>

            <div class="text-left">
                <label class="text-[11px] font-black text-slate-500 uppercase ml-4 mb-2 block tracking-widest">รหัสพนักงาน (Password)</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-5 top-1/2 -translate-y-1/2 text-[#00ff99]/50"></i>
                    <input type="password" id="password" placeholder="••••••••" class="w-full pl-12 pr-6 py-4 rounded-2xl font-bold tracking-[0.5em] text-sm">
                </div>
            </div>

            <button onclick="validateLogin()" class="btn-login w-full font-black py-5 rounded-2xl mt-4 text-lg tracking-[0.2em] uppercase flex items-center justify-center gap-3">
                <span>เข้าสู่ระบบ</span>
                <i class="fa-solid fa-right-to-bracket text-sm"></i>
            </button>

            <div id="error-msg" class="hidden">
                <p class="text-red-400 text-xs font-bold mt-4 flex items-center justify-center gap-2 bg-red-500/10 py-2 rounded-lg border border-red-500/20">
                    <i class="fa-solid fa-triangle-exclamation"></i> รหัสพนักงานไม่ถูกต้อง กรุณาลองใหม่
                </p>
            </div>
            
            <div class="pt-4 border-t border-white/5">
                <a href="index.html" class="inline-flex items-center gap-2 text-[10px] text-slate-500 uppercase font-black tracking-widest hover:text-[#00ff99] transition">
                    <i class="fa-solid fa-arrow-left"></i> 
                    กลับหน้าหลัก
                </a>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูลพนักงาน (คงเดิม)
        const staffData = [
            { id: "11001111", name: "ADMIN" },
            { id: "1234", name: "test" },
            { id: "11006598", name: "นายอาณัติ กิตติขจร" },
            { id: "11006699", name: "นายอภิชาติ พูลทอง" },
            { id: "11019685", name: "นายสมควร สายเส็ง" },
            { id: "11020503", name: "นายสิงห์ ร่วมรส" },
            { id: "11029892", name: "นายอดิศักดิ์ เพชรนิล" },
            { id: "11032311", name: "นายสมเจตน์ ไม้หอม" },
            { id: "11033229", name: "นายคมสรรค์ ศรียา" },
            { id: "70003503", name: "นายฉันทพล อินทสิทธิ์" },
            { id: "70015274", name: "นายปริญญา สุบิน" },
            { id: "70040577", name: "นายวุฒิพงษ์ เพ็ชรพราย" },
            { id: "70052194", name: "นายธีรภัทร พิลึก" },
            { id: "70053291", name: "นายวงศกร ระวังภัย" },
            { id: "70080939", name: "นายจาตุพร ขุนพิลึก" },
            { id: "70097946", name: "นายอนิรุธ เกิด" }
        ];

        const select = document.getElementById('staffSelect');
        staffData.forEach(staff => {
            let opt = document.createElement('option');
            opt.value = staff.name;
            opt.textContent = staff.name;
            select.appendChild(opt);
        });

        function validateLogin() {
            const selectedName = document.getElementById('staffSelect').value;
            const enteredPass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const card = document.getElementById('card');
            const user = staffData.find(u => u.name === selectedName);

            if (user && user.id === enteredPass) {
                // ข้อความระหว่างตรวจสอบ
                document.querySelector('.btn-login span').innerText = "กำลังตรวจสอบ...";
                
                sessionStorage.setItem("userName", user.name);
                sessionStorage.setItem("isLoggedIn", "true");

                setTimeout(() => {
                    if (user.id === "11001111") {
                        window.location.href = "admin-log.html";
                    } else {
                        window.location.href = "inventory-select.html";
                    }
                }, 800);
            } else {
                // แจ้งเตือนเมื่อผิดพลาด
                errorMsg.classList.remove('hidden');
                card.classList.add('error-shake');
                setTimeout(() => card.classList.remove('error-shake'), 400);
                document.getElementById('password').value = "";
            }
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') validateLogin(); });
    </script>
</body>
</html>
