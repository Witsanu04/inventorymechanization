<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction | KP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap');
        :root { --primary: #f97316; --bg-dark: #020617; --card-bg: rgba(11, 17, 32, 0.8); }
        body { background: var(--bg-dark); color: white; font-family: 'Chakra Petch', sans-serif; min-height: 100vh; }
        .bg-gradient { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%); z-index: -1; }
        .input-box { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
        .dropdown-list { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; background: #1e293b; border: 1px solid var(--primary); border-radius: 0 0 12px 12px; z-index: 50; display: none; }
        .dropdown-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dropdown-item:hover { background: var(--primary); color: #020617; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-gradient"></div>

    <div class="w-full max-w-lg bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/10 backdrop-blur-xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black uppercase tracking-tighter text-white">Tool <span class="text-orange-500">Transaction</span></h1>
            <p class="text-xs text-slate-400 mt-2 tracking-widest uppercase">ระบบยืม-คืนอุปกรณ์ R1-STORE</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-sm font-bold text-orange-500 uppercase mb-2 block"><i class="fa-solid fa-user-tag mr-2"></i> 1. ชื่อผู้ทำรายการ (Operator)</label>
                <input type="text" id="operatorName" placeholder="ระบุชื่อของคุณ..." class="input-box text-lg">
            </div>

            <div class="relative">
                <label class="text-sm font-bold text-orange-500 uppercase mb-2 block"><i class="fa-solid fa-magnifying-glass mr-2"></i> 2. เลือกอุปกรณ์ (พิมพ์รหัสหรือชื่อ)</label>
                <input type="text" id="toolSearch" oninput="searchTool()" placeholder="พิมพ์ Mat.Code หรือชื่ออุปกรณ์..." class="input-box text-lg">
                <div id="toolDropdown" class="dropdown-list">
                    </div>
                <div id="selectedInfo" class="mt-3 p-3 bg-orange-500/10 border border-orange-500/20 rounded-xl hidden">
                    <p class="text-xs text-orange-500 font-bold uppercase">รายการที่เลือก:</p>
                    <p id="displayToolName" class="text-sm font-medium text-white"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm font-bold text-orange-500 uppercase mb-2 block"><i class="fa-solid fa-layer-group mr-2"></i> 3. จำนวน</label>
                    <input type="number" id="transQty" value="1" min="1" class="input-box text-center text-2xl font-bold">
                </div>
                <div>
                    <label class="text-sm font-bold text-orange-500 uppercase mb-2 block">ประเภท</label>
                    <select id="transType" class="input-box text-lg font-bold">
                        <option value="OUT" class="bg-slate-900">ยืมออก (Borrow)</option>
                        <option value="IN" class="bg-slate-900">คืนของ (Return)</option>
                    </select>
                </div>
            </div>

            <button onclick="confirmTransaction()" class="w-full bg-orange-500 hover:bg-orange-600 text-slate-900 font-black py-5 rounded-2xl text-xl transition transform active:scale-95 shadow-xl shadow-orange-500/20 mt-4">
                บันทึกรายการ <i class="fa-solid fa-paper-plane ml-2"></i>
            </button>

            <a href="inventory-select.html" class="block text-center text-slate-500 hover:text-white transition text-sm font-bold uppercase tracking-widest mt-4">
                <i class="fa-solid fa-arrow-left mr-2"></i> กลับหน้าหลัก
            </a>
        </div>
    </div>

    <script>
        let toolData = [];
        let selectedTool = null;

        // ดึงข้อมูลจาก Sheets เพื่อมาใช้ในระบบ Search
        async function fetchTools() {
            const sheetID = "1wKEYLTXcg7LCwo4qFpVXUgA4WNyRGIGDeQocqu-7KjU";
            const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Tool%20Store`;
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                toolData = json.table.rows.map(r => ({
                    matCode: r.c[4] ? r.c[4].v : "-",
                    description: r.c[5] ? r.c[5].v : "-"
                })).filter(i => i.matCode !== "-" && !String(i.matCode).includes("Mat.Code"));
            } catch (e) { console.error("Error loading tools:", e); }
        }

        function searchTool() {
            const input = document.getElementById("toolSearch").value.toLowerCase();
            const dropdown = document.getElementById("toolDropdown");
            
            if (input.length < 2) {
                dropdown.style.display = "none";
                return;
            }

            const matches = toolData.filter(i => 
                String(i.matCode).toLowerCase().includes(input) || 
                String(i.description).toLowerCase().includes(input)
            ).slice(0, 10); // โชว์แค่ 10 รายการพอ

            if (matches.length > 0) {
                dropdown.innerHTML = matches.map(m => `
                    <div class="dropdown-item" onclick="selectTool('${m.matCode}', '${m.description}')">
                        <div class="font-bold text-orange-400 text-sm">${m.matCode}</div>
                        <div class="text-xs opacity-70 truncate">${m.description}</div>
                    </div>
                `).join('');
                dropdown.style.display = "block";
            } else {
                dropdown.style.display = "none";
            }
        }

        function selectTool(code, desc) {
            selectedTool = { matCode: code, description: desc };
            document.getElementById("toolSearch").value = code;
            document.getElementById("toolDropdown").style.display = "none";
            
            document.getElementById("selectedInfo").classList.remove("hidden");
            document.getElementById("displayToolName").innerText = desc;
        }

        function confirmTransaction() {
            const op = document.getElementById("operatorName").value;
            const qty = document.getElementById("transQty").value;
            const type = document.getElementById("transType").value;

            if (!op || !selectedTool) {
                alert("กรุณากรอกชื่อและเลือกอุปกรณ์ให้เรียบร้อยครับพี่!");
                return;
            }

            alert(`✅ บันทึกสำเร็จ!\n\nผู้ทำรายการ: ${op}\nรายการ: ${selectedTool.description}\nประเภท: ${type}\nจำนวน: ${qty}`);
            
            // ล้างข้อมูลหลังบันทึก
            document.getElementById("operatorName").value = "";
            document.getElementById("toolSearch").value = "";
            document.getElementById("selectedInfo").classList.add("hidden");
            selectedTool = null;
        }

        window.onload = fetchTools;
    </script>
</body>
</html>
