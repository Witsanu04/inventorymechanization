<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Mechanization System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap');
        body { background: #020617; color: white; font-family: 'Chakra Petch', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: rgba(11, 17, 32, 0.9); border: 1px solid rgba(0, 255, 153, 0.2); backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); }
        select, input { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid #1e293b !important; color: white !important; transition: all 0.3s; }
        select:focus, input:focus { border-color: #00ff99 !important; box-shadow: 0 0 15px rgba(0, 255, 153, 0.2); outline: none; }
        option { background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div class="login-card w-full max-w-[420px] p-10 rounded-[3rem] text-center m-4 border-t-4 border-[#00ff99]">
        <div class="mb-6">
            <div class="w-20 h-20 bg-[#00ff99]/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-[#00ff99]/30">
                <i class="fa-solid fa-id-badge text-4xl text-[#00ff99]"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tighter uppercase">System Access</h1>
            <p class="text-[10px] text-[#00ff99] tracking-[0.3em] font-bold uppercase mt-2">Identify Employee Credentials</p>
        </div>

        <div class="space-y-6">
            <div class="input-group text-left">
                <label class="text-[11px] font-bold text-slate-500 uppercase ml-4 mb-1 block tracking-widest">ชื่อผู้ใช้งาน</label>
                <select id="staffSelect" class="w-full px-6 py-4 rounded-2xl font-bold appearance-none cursor-pointer">
                    <option value="" disabled selected>-- เลือกรายชื่อของคุณ --</option>
                </select>
            </div>

            <div class="input-group text-left">
                <label class="text-[11px] font-bold text-slate-500 uppercase ml-4 mb-1 block tracking-widest">รหัสพนักงาน (Password)</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-6 py-4 rounded-2xl font-bold tracking-widest">
            </div>

            <button onclick="validateLogin()" class="w-full bg-[#00ff99] text-[#020617] font-extrabold py-5 rounded-2xl shadow-lg shadow-emerald-500/20 active:scale-95 transition-all mt-2 text-lg tracking-widest uppercase">
                Login
            </button>

            <p id="error-msg" class="text-red-500 text-xs font-bold mt-4 hidden animate-pulse">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> รหัสพนักงานไม่ถูกต้อง
            </p>
            
            <a href="index.html" class="block text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-2 hover:text-white transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        const staffData = [
            { id: "11001111", name: "ADMIN" },
            { id: "1234", name: "test" },
            { id: "11006598", name: "นายอาณัติ กิตติขจร" },
            { id: "11006699", name: "นายอภิชาติ พูลทอง" },
            { id: "11019685", name: "นายสมควร สายเส็ง" },
            { id: "11020503", name: "นายสิงห์ ร่วมรส" },
            { id: "11029892", name: "นายอดิศักดิ์ เพชรนิล" },
            { id: "11032311", name: "นายสมเจตน์ ไม้หอม" },
            { id: "11033229", name: "นายคมสรรค์ ศรียา" },
            { id: "70003503", name: "นายฉันทพล อินทสิทธิ์" },
            { id: "70015274", name: "นายปริญญา สุบิน" },
            { id: "70040577", name: "นายวุฒิพงษ์ เพ็ชรพราย" },
            { id: "70052194", name: "นายธีรภัทร พิลึก" },
            { id: "70053291", name: "นายวงศกร ระวังภัย" },
            { id: "70080939", name: "นายจาตุพร ขุนพิลึก" },
            { id: "70097946", name: "นายอนิรุธ เกิด" }
        ];

        const select = document.getElementById('staffSelect');
        staffData.forEach(staff => {
            let opt = document.createElement('option');
            opt.value = staff.name;
            opt.textContent = staff.name;
            select.appendChild(opt);
        });

        function validateLogin() {
            const selectedName = document.getElementById('staffSelect').value;
            const enteredPass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const user = staffData.find(u => u.name === selectedName);

            if (user && user.id === enteredPass) {
                sessionStorage.setItem("userName", user.name);
                sessionStorage.setItem("isLoggedIn", "true");

                // ถ้าเป็น Admin (พี่) ให้ไปหน้า Log ท่านอื่นไปหน้าเบิกของ
                if (user.id === "11001111") {
                    window.location.href = "admin-log.html";
                } else {
                    window.location.href = "inventory-select.html";
                }
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('password').value = "";
            }
        }
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') validateLogin(); });
    </script>
</body>
</html>
