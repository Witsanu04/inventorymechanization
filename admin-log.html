<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | KP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&display=swap');
        :root { 
            --primary: #a855f7; 
            --secondary: #06b6d4; 
            --bg-dark: #020617; 
            --card-bg: rgba(15, 23, 42, 0.8); 
            --border: rgba(168, 85, 247, 0.2); 
        }
        
        body { background: var(--bg-dark); color: white; font-family: 'Chakra Petch', sans-serif; padding-top: 110px; min-height: 100vh; overflow-x: hidden; }
        
        .warehouse-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; background: #020617; }
        .warehouse-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.1) grayscale(0.5); background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2070'); background-size: cover; }
        
        .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 90px; z-index: 1000; display: flex; justify-content: center; align-items: center; background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-container { display: flex; gap: 10px; background: rgba(30, 41, 59, 0.5); padding: 8px; border-radius: 35px; border: 1px solid var(--border); }
        .nav-link { padding: 10px 22px; border-radius: 25px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); transition: 0.3s; text-decoration: none; }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }

        .glass-card { background: var(--card-bg); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: 1.25rem; transition: 0.3s; }
        .monitor-box { background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(15, 23, 42, 0.9) 100%); border: 1px solid var(--primary); }
        
        .pulse-dot { width: 12px; height: 12px; background: var(--secondary); border-radius: 50%; box-shadow: 0 0 12px var(--secondary); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }

        .type-badge { padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .out { color: #f87171; border: 1px solid rgba(248, 113, 113, 0.4); background: rgba(248, 113, 113, 0.1); }
        .in { color: #34d399; border: 1px solid rgba(52, 211, 153, 0.4); background: rgba(52, 211, 153, 0.1); }
        
        .input-field { background: rgba(15, 23, 42, 0.9); border: 1px solid var(--border); border-radius: 14px; padding: 12px; color: white; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--secondary); box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }

        .btn-verify { background: #10b981; color: #020617; padding: 6px 14px; border-radius: 8px; font-weight: 800; font-size: 11px; transition: 0.2s; }
        .btn-verify:hover { background: #34d399; transform: translateY(-2px); }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 6px 10px; border-radius: 8px; transition: 0.2s; }
        .btn-delete:hover { background: #ef4444; color: white; transform: translateY(-2px); }
        
        .verified-row { opacity: 0.6; background: rgba(16, 185, 129, 0.03) !important; }
    </style>
</head>
<body>
     
    <script>
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
    .then(() => console.log("Service Worker Registered"));
    }
    </script>
    
    <div class="warehouse-scene"><div class="warehouse-img"></div></div>

    <nav class="top-nav">
        <div class="nav-container text-xs md:text-sm">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> <span>หน้าแรก</span></a>
            <a href="inventory-select.html" class="nav-link"><i class="fa-solid fa-boxes-stacked"></i> <span>สต็อกสินค้า</span></a>
            <a href="admin-log.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> <span>แผงควบคุมแอดมิน</span></a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter leading-none">
                    SYSTEM <span class="text-purple-500">ADMIN</span>
                </h1>
                <p class="text-cyan-500 font-bold text-xs tracking-[0.3em] mt-2 flex items-center gap-2">
                    <span class="pulse-dot"></span> การเข้าถึงระดับสูง • ข้อมูล Firebase Real-time
                </p>
            </div>
            <div id="clock" class="text-right font-mono text-purple-400 font-bold text-lg md:text-xl bg-purple-500/10 px-4 py-2 rounded-lg border border-purple-500/20"></div>
        </div>

        <div class="glass-card monitor-box p-6 mb-8 relative overflow-hidden group">
            <div class="flex items-center gap-3 mb-4 border-b border-white/10 pb-3">
                <i class="fa-solid fa-satellite-dish text-cyan-400 animate-pulse"></i>
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-300">กิจกรรมล่าสุดในระบบ (Live Feed)</h2>
            </div>
            <div id="latestActivity" class="text-2xl md:text-3xl font-bold text-white min-h-[70px] flex items-center italic tracking-tight">
                <span class="text-slate-600 animate-pulse">กำลังเชื่อมต่อฐานข้อมูล Firebase...</span>
            </div>
            <div id="activityDetails" class="text-xs text-cyan-500 mt-2 font-mono uppercase tracking-[0.2em] opacity-80"></div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6 border-t-2 border-t-purple-500">
                <p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">รายการวันนี้</p>
                <p id="countTotal" class="text-4xl font-black text-white">0</p>
            </div>
            <div class="glass-card p-6 border-t-2 border-t-red-500">
                <p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">เบิกออก (ครั้ง)</p>
                <p id="countOut" class="text-4xl font-black text-red-500">0</p>
            </div>
            <div class="glass-card p-6 border-t-2 border-t-emerald-500">
                <p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">คืนของ (ครั้ง)</p>
                <p id="countIn" class="text-4xl font-black text-emerald-500">0</p>
            </div>
            <div class="glass-card p-6 border-t-2 border-t-cyan-500">
                <p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">รอตรวจสอบ</p>
                <p id="countPending" class="text-4xl font-black text-cyan-500">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="md:col-span-3 relative">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-purple-500"></i>
                <input type="text" id="searchInput" onkeyup="renderLogs()" placeholder="ค้นหาชื่อผู้ยืม, MatCode หรือรายการสินค้า..." class="w-full input-field pl-12 pr-4 py-4 text-sm font-bold shadow-2xl">
            </div>
            <select id="typeFilter" onchange="renderLogs()" class="input-field py-4 px-6 text-sm font-bold cursor-pointer">
                <option value="ALL">ทุกประเภทรายการ</option>
                <option value="OUT">ยืมออก (WITHDRAW)</option>
                <option value="IN">คืนของ (RETURN)</option>
                <option value="PENDING">รอตรวจสอบเท่านั้น</option>
            </select>
        </div>

        <div class="glass-card overflow-hidden border-purple-500/30 shadow-2xl">
            <div class="overflow-x-auto" style="max-height: 55vh;">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-[#0f172a] z-10 border-b border-purple-500/30">
                        <tr class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">
                            <th class="p-5">วัน-เวลา</th>
                            <th class="p-5">ผู้ปฏิบัติงาน</th>
                            <th class="p-5">รายการสินค้า</th>
                            <th class="p-5 text-center">จำนวน</th>
                            <th class="p-5 text-center">ประเภท</th>
                            <th class="p-5 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="logTable" class="divide-y divide-white/[0.03]"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBqlBzXhKiGtOGx4fzKcul2gMKoJTEs968",
            authDomain: "kp-inventory-system.firebaseapp.com",
            databaseURL: "https://kp-inventory-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kp-inventory-system",
            storageBucket: "kp-inventory-system.firebasestorage.app",
            messagingSenderId: "776715886830",
            appId: "1:776715886830:web:7e6fd0bb788113a00353ff"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allLogs = [];

        // ฟังข้อมูลจาก Firebase แบบ Real-time
        function listenToLogs() {
            db.ref('all_transactions').on('value', (snapshot) => {
                const data = snapshot.val();
                allLogs = [];
                if (data) {
                    Object.keys(data).forEach(key => {
                        allLogs.push({ id: key, ...data[key] });
                    });
                }
                allLogs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                updateLiveFeed();
                renderLogs();
            });
        }

        function updateLiveFeed() {
            if(allLogs.length > 0) {
                const last = allLogs[0];
                const actionTxt = last.type === "OUT" ? "ยืมออก" : "คืนของ";
                const actionColor = last.type === "OUT" ? "text-red-500" : "text-emerald-500";
                
                document.getElementById("latestActivity").innerHTML = `
                    <span>${last.opName} <span class="${actionColor}">${actionTxt}</span> : ${last.toolName}</span>
                `;
                const dateObj = new Date(last.timestamp);
                document.getElementById("activityDetails").innerText = `เวลาบันทึก: ${dateObj.toLocaleString()} | รหัส: ${last.matCode} | จำนวน: ${last.qty}`;
            }
        }

        function renderLogs() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const filter = document.getElementById("typeFilter").value;
            const container = document.getElementById("logTable");
            
            const filtered = allLogs.filter(log => {
                const matchSearch = String(log.opName).toLowerCase().includes(search) || 
                                    String(log.toolName).toLowerCase().includes(search) || 
                                    String(log.matCode).toLowerCase().includes(search);
                
                let matchType = true;
                if(filter === "PENDING") matchType = log.adminStatus !== "Verified";
                else if(filter !== "ALL") matchType = log.type === filter;

                return matchSearch && matchType;
            });

            container.innerHTML = filtered.map(log => {
                const isVerified = log.adminStatus === "Verified";
                const rowClass = isVerified ? 'verified-row' : '';
                const timeStr = new Date(log.timestamp).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});

                return `
                <tr class="hover:bg-purple-500/[0.05] transition group ${rowClass}">
                    <td class="p-5 text-[11px] text-slate-500 font-mono">
                        ${new Date(log.timestamp).toLocaleDateString()}<br>${timeStr}
                    </td>
                    <td class="p-5">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center text-purple-400">
                                <i class="fa-solid fa-user-gear text-[10px]"></i>
                            </div>
                            <span class="font-bold text-slate-200">${log.opName}</span>
                        </div>
                    </td>
                    <td class="p-5">
                        <div class="text-xs text-white font-bold">${log.toolName}</div>
                        <div class="text-[10px] text-cyan-500 font-mono italic">${log.matCode}</div>
                    </td>
                    <td class="p-5 text-center font-black text-white">${log.qty}</td>
                    <td class="p-5 text-center">
                        <span class="type-badge ${log.type.toLowerCase()}">${log.type}</span>
                    </td>
                    <td class="p-5">
                        <div class="flex items-center justify-center gap-2">
                            ${isVerified 
                                ? `<div class="bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-md text-[10px] font-bold"><i class="fa-solid fa-check mr-1"></i> VERIFIED</div>` 
                                : `<button onclick="verifyItem('${log.id}')" class="btn-verify shadow-lg shadow-emerald-500/20">CHECK</button>`
                            }
                            <button onclick="deleteItem('${log.id}')" class="btn-delete" title="ลบรายการนี้">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `}).join('');

            // Update Statistics
            document.getElementById("countTotal").innerText = allLogs.filter(l => isToday(new Date(l.timestamp))).length;
            document.getElementById("countOut").innerText = allLogs.filter(l => l.type === "OUT").length;
            document.getElementById("countIn").innerText = allLogs.filter(l => l.type === "IN").length;
            document.getElementById("countPending").innerText = allLogs.filter(l => l.adminStatus !== "Verified").length;
        }

        async function verifyItem(id) {
            if(confirm("ยืนยันการตรวจสอบอุปกรณ์รายการนี้?")) {
                try {
                    await db.ref('all_transactions/' + id).update({
                        adminStatus: "Verified",
                        verifiedAt: new Date().toISOString()
                    });
                } catch (e) {
                    alert("เกิดข้อผิดพลาดในการยืนยันข้อมูล");
                }
            }
        }

        async function deleteItem(id) {
            if(confirm("⚠️ คุณต้องการลบรายการนี้ใช่หรือไม่?\nการลบข้อมูลจะหายไปจากฐานข้อมูลทันทีและไม่สามารถกู้คืนได้")) {
                try {
                    await db.ref('all_transactions/' + id).remove();
                } catch (e) {
                    alert("เกิดข้อผิดพลาดในการลบข้อมูล: " + e.message);
                }
            }
        }

        function isToday(someDate) {
            const today = new Date();
            return someDate.getDate() == today.getDate() &&
                someDate.getMonth() == today.getMonth() &&
                someDate.getFullYear() == today.getFullYear();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById("clock").innerText = now.toLocaleString('th-TH', { hour12: false });
        }

        setInterval(updateClock, 1000);
        window.onload = listenToLogs;
    </script>
</body>
</html>
