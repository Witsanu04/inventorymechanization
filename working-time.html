<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Records | KP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Chakra+Petch:wght@500;700&display=swap');
        
        :root { 
            --primary: #22c55e; /* สีเขียวหลักตามรูป */
            --bg-light: #f8fafc; 
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }
        
        body { 
            background: var(--bg-light); 
            color: #1e293b; 
            font-family: 'Inter', 'Chakra Petch', sans-serif; 
            padding-top: 100px; 
            min-height: 100vh;
        }

        /* --- TOP NAV (ตามรูปที่พี่ส่งมา) --- */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: 85px; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(15px);
        }
        .nav-pill {
            display: flex; align-items: center; gap: 4px;
            background: white;
            padding: 8px; border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .nav-item {
            padding: 10px 20px; border-radius: 18px; font-size: 0.9rem; font-weight: 600;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
            color: #64748b; text-decoration: none;
        }
        .nav-item.active { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); 
        }
        .nav-item:not(.active):hover { background: #f1f5f9; color: #1e293b; }
        .nav-logout { color: #ef4444 !important; }

        /* --- UI Elements --- */
        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }
        .search-input { 
            background: white; 
            border: 1px solid var(--border-color); 
            transition: 0.3s; 
        }
        .search-input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1); 
        }
        
        /* Status Badge */
        .status-badge { 
            padding: 5px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; 
            text-transform: uppercase; border: 1px solid transparent; 
        }
        .status-done { background: #f0fdf4; color: #16a34a; border-color: #dcfce7; }
        .status-pending { background: #eff6ff; color: #2563eb; border-color: #dbeafe; }
        .status-urgent { background: #fef2f2; color: #dc2626; border-color: #fee2e2; }
    </style>
</head>
<body>

    <nav class="top-nav px-4">
        <div class="nav-pill">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span class="nav-text">หน้าแรก</span>
            </a>
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-chart-line"></i>
                <span class="nav-text">สรุปข้อมูล</span>
            </a>
            <a href="working-time.html" class="nav-item active">
                <i class="fa-solid fa-clock"></i>
                <span class="nav-text">บันทึกเวลา</span>
            </a>
            <a href="inventory-select.html" class="nav-item">
                <i class="fa-solid fa-box-archive"></i>
                <span class="nav-text">จัดการสต็อก</span>
            </a>
            <div class="w-[1px] h-6 bg-slate-200 mx-2"></div>
            <button onclick="handleLogout()" class="nav-item nav-logout">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight italic uppercase">Work Records</h1>
                <p class="text-sm text-slate-400 font-medium">ระบบจัดเก็บประวัติการทำงานแผนกวิศวกรรม</p>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative flex-1 md:w-80">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="workSearch" onkeyup="filterWorkData()" 
                           placeholder="ค้นหาพนักงาน หรือ ชื่องาน..." 
                           class="search-input w-full rounded-2xl pl-12 pr-6 py-4 text-sm outline-none">
                </div>
                <button onclick="loadWorkData()" class="bg-white hover:bg-slate-50 p-4 rounded-2xl border border-slate-200 transition-all text-slate-600 shadow-sm">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 text-[11px] uppercase tracking-widest text-slate-500 border-b border-slate-100">
                        <tr>
                            <th class="p-6 font-bold">พนักงาน (Staff)</th>
                            <th class="p-6 font-bold">งานที่ปฏิบัติ (Project/Task)</th>
                            <th class="p-6 font-bold text-center">วันที่ (Date)</th>
                            <th class="p-6 font-bold text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="workTableBody" class="divide-y divide-slate-50 text-slate-700">
                        <tr>
                            <td colspan="4" class="p-24 text-center">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="w-12 h-12 border-4 border-slate-100 border-t-green-500 rounded-full animate-spin"></div>
                                    <span class="text-slate-400 font-bold text-xs uppercase tracking-widest">กำลังดึงข้อมูล...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div id="emptyMsg" class="hidden text-center p-20 text-slate-400 italic font-medium">ไม่พบข้อมูลที่ท่านค้นหาในระบบ...</div>
    </main>

    <script>
        if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "login.html"; }
        function handleLogout() { sessionStorage.clear(); window.location.href = "login.html"; }

        const sheetID = "1ZaWf8sYX0wC7ege0evyj9R2EIsA5nUOROprzCPdscmE"; 
        const url = `https://opensheet.elk.sh/${sheetID}/Work`; 
        let workData = [];

        async function loadWorkData() {
            try {
                const res = await fetch(url);
                workData = await res.json();
                renderTable(workData);
            } catch(e) { 
                document.getElementById("workTableBody").innerHTML = `
                    <tr><td colspan="4" class="p-20 text-center text-red-500 font-bold">ไม่สามารถเชื่อมต่อ Google Sheets ได้</td></tr>`; 
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById("workTableBody");
            const emptyMsg = document.getElementById("emptyMsg");
            tbody.innerHTML = "";
            
            if (items.length === 0) {
                emptyMsg.classList.remove('hidden');
                return;
            } else { emptyMsg.classList.add('hidden'); }

            items.forEach(row => {
                const cleanRow = {};
                Object.keys(row).forEach(k => cleanRow[k.trim().toLowerCase().replace(/\s/g, '')] = row[k]);
                
                const staff = cleanRow['staffname'] || cleanRow['ชื่อ'] || "N/A";
                const task = cleanRow['task'] || cleanRow['งาน'] || "-";
                const date = cleanRow['date'] || cleanRow['วันที่'] || "-";
                const statusValue = (cleanRow['status'] || "Pending").trim();

                let statusClass = "status-pending";
                if (statusValue.includes("เสร็จ") || statusValue.toLowerCase() === "done") statusClass = "status-done";
                if (statusValue.includes("ด่วน") || statusValue.includes("แก้")) statusClass = "status-urgent";

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold text-xs border border-slate-200">
                                    ${staff.substring(0, 2).toUpperCase()}
                                </div>
                                <div class="font-bold text-slate-800">${staff}</div>
                            </div>
                        </td>
                        <td class="p-6 text-sm font-medium text-slate-600">${task}</td>
                        <td class="p-6 text-center text-slate-400 text-sm font-semibold">${date}</td>
                        <td class="p-6 text-center"><span class="status-badge ${statusClass}">${statusValue}</span></td>
                    </tr>`;
            });
        }

        function filterWorkData() {
            const key = document.getElementById("workSearch").value.toLowerCase();
            const filtered = workData.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(key)));
            renderTable(filtered);
        }

        window.onload = loadWorkData;
    </script>
</body>
</html>
